name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── CLOUDFLARE PAGES ────────────────────────────────────────────────────────
jobs:

  deploy-rda-ceremonia-online:
    name: 🌬️ RDA Ceremonia Online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          projectName: rda-ceremonia-online
          directory: rda-ceremonia-online
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-rda-acceso-anticipado:
    name: 🔔 RDA Acceso Anticipado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          projectName: rda-acceso-anticipado
          directory: rda-acceso-anticipado
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-comunicacion-celestial:
    name: ✨ Comunicación Celestial
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          projectName: comunicacion-celestial
          directory: comunicacion-celestial
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

# ── CLOUDFLARE WORKERS (mecanismo diferente) ─────────────────────────────────

  deploy-meditacion-luz-cristica:
    name: 🕊️ Meditación Luz Crística (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          workingDirectory: meditacion-luz-cristica

# ── AGREGAR NUEVOS PROYECTOS AQUÍ ──────────────────────────────────────────
#
# Para un nuevo Cloudflare PAGES:
#   - Copiar bloque "deploy-rda-ceremonia-online"
#   - Cambiar: name, projectName, directory
#
# Para un nuevo Cloudflare WORKER:
#   - Copiar bloque "deploy-meditacion-luz-cristica"
#   - Cambiar: name, workingDirectory (carpeta con wrangler.toml)
#
# ───────────────────────────────────────────────────────────────────────────
