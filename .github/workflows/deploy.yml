name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  deploy-rda-ceremonia-online:
    name: 🌬️ RDA Ceremonia Online
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          command: pages deploy rda-ceremonia-online --project-name=rda-ceremonia-online --branch=main

  deploy-rda-acceso-anticipado:
    name: 🔔 RDA Acceso Anticipado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          command: pages deploy rda-acceso-anticipado --project-name=rda-acceso-anticipado --branch=main

  deploy-comunicacion-celestial:
    name: ✨ Comunicación Celestial
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          command: pages deploy comunicacion-celestial --project-name=comunicacion-celestial --branch=main

  deploy-meditacion-luz-cristica:
    name: 🕊️ Meditación Luz Crística (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 217bc3420af5e0d4007dc2336df35db2
          workingDirectory: meditacion-luz-cristica

# ── AGREGAR NUEVOS PROYECTOS AQUÍ ──────────────────────────────────────────
#
# Para un nuevo Cloudflare PAGES:
#   - Copiar bloque "deploy-rda-ceremonia-online"
#   - Cambiar: name, carpeta en "pages deploy CARPETA", --project-name=NOMBRE
#
# Para un nuevo Cloudflare WORKER:
#   - Copiar bloque "deploy-meditacion-luz-cristica"
#   - Cambiar: name, workingDirectory
#
# ───────────────────────────────────────────────────────────────────────────
